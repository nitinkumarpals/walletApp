name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build:
    name: Verify (Maven, JDK 25)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      # Compiles + runs the Spring Modulith boundary verification test.
      # No database or secrets are needed (the test is static analysis).
      - name: Build & verify
        run: |
          chmod +x ./mvnw
          ./mvnw -B --no-transfer-progress clean verify
